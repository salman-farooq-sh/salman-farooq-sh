name: Update README cards

on:
  push:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_title=true&hide_rank=true&include_all_commits=true&show=discussions_started,prs_merged&theme=transparent&disable_animations=true&line_height=32
          path: profile/stats.svg
          token: ${{ secrets.METRICS_EMBED_GITHUB_TOKEN }}

      - name: Generate languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=14&hide_title=true&disable_animations=true&theme=transparent&line_height=32
          path: profile/top-langs.svg
          token: ${{ secrets.METRICS_EMBED_GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
